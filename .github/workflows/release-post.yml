name: Release → X Post

on:
  release:
    types: [published]

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshot
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          node -e "
          const { chromium } = require('playwright');

          // リリースノートのキーワードからスクリーンショット対象ページとフォーカス要素を判定
          const body = (process.env.RELEASE_BODY || '').toLowerCase();
          const targets = [
            { match: ['タンカー', 'tanker', 'ais', '航跡', '港'], page: '/last-tanker', selector: 'svg' },
            { match: ['地図', 'map', '崩壊順', 'collapse map', 'エリア', '地域', '備蓄基地'], page: '/collapse-map', selector: 'svg' },
            { match: ['食料', 'food', 'サプライチェーン'], page: '/food-collapse', selector: 'h2' },
            { match: ['family', '家庭', 'サバイバル'], page: '/family', selector: 'form' },
            { match: ['フロー', 'simulation', 'カウントダウン', 'clock', 'タイムライン'], page: '/countdown', selector: 'svg' },
            { match: ['iea', '国際', '備蓄比較', '各国'], page: '/', selector: '[class*=\"INTERNATIONAL\"], [class*=\"iea\"]' },
            { match: ['備蓄', 'prepare', 'ガイド', 'チェックリスト', '行動'], page: '/prepare', selector: 'h2' },
          ];

          let targetPage = '/';
          let targetSelector = null;
          for (const t of targets) {
            if (t.match.some(m => body.includes(m))) {
              targetPage = t.page;
              targetSelector = t.selector;
              break;
            }
          }

          console.log('Screenshot target:', targetPage, 'selector:', targetSelector);

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({ viewport: { width: 1200, height: 630 }, colorScheme: 'dark' });
            await page.goto('https://surviveasonejp.org' + targetPage, { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(3000);

            // 地図・グラフ・表の位置までスクロールしてからスクショ
            if (targetSelector) {
              try {
                const el = await page.$(targetSelector);
                if (el) {
                  await el.scrollIntoViewIfNeeded();
                  await page.waitForTimeout(500);
                }
              } catch (e) {
                console.log('Selector not found, using default viewport:', e.message);
              }
            }

            await page.screenshot({ path: 'screenshot.png', type: 'png' });
            await browser.close();
            console.log('Screenshot saved for:', targetPage);
          })();
          "

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          node -e "
          const crypto = require('crypto');
          const fs = require('fs');
          const https = require('https');
          const http = require('http');

          const apiKey = process.env.X_API_KEY;
          const apiSecret = process.env.X_API_SECRET;
          const accessToken = process.env.X_ACCESS_TOKEN;
          const accessTokenSecret = process.env.X_ACCESS_TOKEN_SECRET;
          const tag = process.env.RELEASE_TAG;
          const name = process.env.RELEASE_NAME;
          const url = process.env.RELEASE_URL;

          // OAuth 1.0a signature
          function oauthSign(method, baseUrl, params, consumerSecret, tokenSecret) {
            const sortedParams = Object.keys(params).sort().map(k =>
              encodeURIComponent(k) + '=' + encodeURIComponent(params[k])
            ).join('&');
            const base = method + '&' + encodeURIComponent(baseUrl) + '&' + encodeURIComponent(sortedParams);
            const signingKey = encodeURIComponent(consumerSecret) + '&' + encodeURIComponent(tokenSecret);
            return crypto.createHmac('sha1', signingKey).update(base).digest('base64');
          }

          function oauthHeader(method, url, extraParams = {}) {
            const nonce = crypto.randomBytes(16).toString('hex');
            const timestamp = Math.floor(Date.now() / 1000).toString();
            const oauthParams = {
              oauth_consumer_key: apiKey,
              oauth_nonce: nonce,
              oauth_signature_method: 'HMAC-SHA1',
              oauth_timestamp: timestamp,
              oauth_token: accessToken,
              oauth_version: '1.0',
              ...extraParams,
            };
            const signature = oauthSign(method, url, oauthParams, apiSecret, accessTokenSecret);
            oauthParams.oauth_signature = signature;
            const header = 'OAuth ' + Object.keys(oauthParams)
              .filter(k => k.startsWith('oauth_'))
              .sort()
              .map(k => encodeURIComponent(k) + '=\"' + encodeURIComponent(oauthParams[k]) + '\"')
              .join(', ');
            return header;
          }

          function request(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function uploadMedia() {
            const mediaData = fs.readFileSync('screenshot.png').toString('base64');
            const uploadUrl = 'https://upload.twitter.com/1.1/media/upload.json';
            const params = { media_data: mediaData };
            const body = 'media_data=' + encodeURIComponent(mediaData);
            const auth = oauthHeader('POST', uploadUrl, params);

            const res = await request({
              hostname: 'upload.twitter.com',
              path: '/1.1/media/upload.json',
              method: 'POST',
              headers: {
                'Authorization': auth,
                'Content-Type': 'application/x-www-form-urlencoded',
                'Content-Length': Buffer.byteLength(body),
              },
            }, body);

            if (res.status !== 200) {
              console.error('Media upload failed:', res.status, res.body);
              return null;
            }
            return JSON.parse(res.body).media_id_string;
          }

          async function postTweet(mediaId) {
            const lines = [
              '【' + tag + ' リリース】' + name,
              '',
              'surviveasonejp.org',
              url,
              '',
              '#SurviveAsOne #ホルムズ海峡 #石油危機 #エネルギー',
            ];
            const text = lines.join('\n');

            const tweetBody = JSON.stringify({
              text: text,
              ...(mediaId ? { media: { media_ids: [mediaId] } } : {}),
            });

            const tweetUrl = 'https://api.twitter.com/2/tweets';
            const auth = oauthHeader('POST', tweetUrl);

            const res = await request({
              hostname: 'api.twitter.com',
              path: '/2/tweets',
              method: 'POST',
              headers: {
                'Authorization': auth,
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(tweetBody),
              },
            }, tweetBody);

            console.log('Tweet response:', res.status, res.body);
            if (res.status === 201) {
              console.log('Successfully posted to X!');
            } else {
              console.error('Tweet failed');
              process.exit(1);
            }
          }

          (async () => {
            console.log('Uploading screenshot...');
            const mediaId = await uploadMedia();
            console.log('Media ID:', mediaId);

            console.log('Posting tweet...');
            await postTweet(mediaId);
          })();
          "
