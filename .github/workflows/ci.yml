name: CI

# PR 時の品質ゲート: プロダクションビルドが通ることを保証する。
# secret-scan.yml(gitleaks) と並ぶ必須チェックとして main 保護に登録する。
#
# 注: `tsc --noEmit` は現状コードベースに 150 件の既存型エラー
# (TS2304 D1Database 系=tsconfig に @cloudflare/workers-types 未設定が主因 +
#  TS2532/18048 等の実 strict 債務) があり通らないため、まだゲート化しない。
# 債務解消(tsconfig 是正 + strict 修正)後に Type check ステップを追加し必須化する。

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
