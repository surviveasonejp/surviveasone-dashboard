name: CI

# PR 時の品質ゲート: 型チェック(tsc --noEmit) + プロダクションビルド。
# secret-scan.yml(gitleaks) と並ぶ必須チェック(check 名: build)として main 保護に登録する。
# build スクリプト(vite build)は esbuild で型チェックしないため、tsc を明示実行する。

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
