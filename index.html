      <div style="background:#0f1419;color:#fff;font-family:sans-serif;padding:2rem;max-width:800px;margin:0 auto;line-height:1.8;">
        <h1 style="color:#ef4444;font-size:2rem;">Survive as One</h1>
        <p style="font-size:1.2rem;margin:1rem 0;">日本のエネルギーが尽きるまで</p>

        <div style="background:#1a1a2e;border:1px solid #f59e0b;border-radius:8px;padding:1rem;margin:1.5rem 0;font-size:0.85rem;">
          <strong style="color:#f59e0b;">⚠ これは予測ではなくシミュレーションです</strong><br>
          本サイトは「ホルムズ海峡経由の供給途絶」を前提としたリスクシナリオの可視化ツールです。実際にはIEA協調備蓄放出、代替供給ルートの確保、需要削減政策等の対応が取られます。日本の石油備蓄はIEA基準で国際的に充実した水準（204日分）にあります。
        </div>

        <h2 style="font-size:1rem;margin-top:1.5rem;">エネルギー依存構造</h2>
        <ul>
          <li>石油輸入の<strong style="color:#f59e0b;">94%</strong>が中東依存（全量がホルムズ海峡を通過）</li>
          <li>石油備蓄: <strong style="color:#f59e0b;">241日分</strong>（国家146日+民間89日+産油国共同6日 — 経産省2026年3月20日推計）</li>
          <li>LNG在庫: <strong>約25日分</strong>（ホルムズ直接依存は6.3%。主要輸入先: 豪州39.7%、マレーシア14.8% — JETRO 2025年）</li>
          <li>火力発電比率: <strong>65%</strong>（LNG29% + 石炭28% + 石油7% — ISEP 2024年暦年速報）</li>
          <li>原子力: 14基稼働中（関西7基/九州4基/四国1基/東北1基/中国1基 — 原子力規制委員会）</li>
        </ul>

        <h2 style="font-size:1rem;margin-top:1.5rem;">3つのシナリオ</h2>
        <table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin:0.5rem 0;">
          <tr style="border-bottom:1px solid #333;">
            <th style="text-align:left;padding:0.5rem;color:#999;">シナリオ</th>
            <th style="text-align:left;padding:0.5rem;color:#999;">石油遮断率</th>
            <th style="text-align:left;padding:0.5rem;color:#999;">LNG遮断率</th>
            <th style="text-align:left;padding:0.5rem;color:#999;">需要変動</th>
          </tr>
          <tr style="border-bottom:1px solid #222;">
            <td style="padding:0.5rem;color:#22c55e;">楽観（部分封鎖）</td>
            <td style="padding:0.5rem;">50%</td>
            <td style="padding:0.5rem;">3%</td>
            <td style="padding:0.5rem;">-15%削減</td>
          </tr>
          <tr style="border-bottom:1px solid #222;">
            <td style="padding:0.5rem;color:#f59e0b;">現実（全面封鎖）</td>
            <td style="padding:0.5rem;">94%</td>
            <td style="padding:0.5rem;">6.3%</td>
            <td style="padding:0.5rem;">-5%削減</td>
          </tr>
          <tr>
            <td style="padding:0.5rem;color:#ef4444;">悲観（全面+パニック）</td>
            <td style="padding:0.5rem;">100%</td>
            <td style="padding:0.5rem;">15%</td>
            <td style="padding:0.5rem;">+10%増加</td>
          </tr>
        </table>
        <p style="font-size:0.8rem;color:#666;">各シナリオに封鎖解除曲線（段階的解除）・SPR放出メカニズム・需要破壊モデルが含まれます。</p>

        <h2 style="font-size:1rem;margin-top:1.5rem;">崩壊順序（現実シナリオ）</h2>
        <p>沖縄（完全島嶼・連系線なし）→ 北海道（連系線90万kW限定）→ 四国 → 東京（最大需要圏）→ 関西（原発7基で延命）→ 九州（原発4基+太陽光12GW）</p>

        <h2 style="font-size:1rem;margin-top:1.5rem;">計算モデル</h2>
        <ul style="font-size:0.85rem;color:#999;">
          <li>フロー型在庫モデル: dStock/dt = Inflow - Consumption + SPR_Release</li>
          <li>SPR放出: 国家備蓄は14日リードタイム、日次上限30万kL。民間は即日・実質70%</li>
          <li>封鎖解除曲線: シナリオ別に段階的解除（楽観: 30日で解除/現実: 120日/悲観: 365日）</li>
          <li>需要破壊: 在庫50%以下で産業15%減、30%以下で35%減、10%以下で55%減</li>
          <li>連系線融通: OCCTO運用容量ベース、10本の連系線、非対称容量対応</li>
          <li>原子力補正: 地域別に稼働原発の出力を反映（関西は火力依存約35%に低下）</li>
          <li>再エネバッファ: 太陽光/風力/水力の設備利用率を反映</li>
          <li>水道崩壊: 電力停止→同日水圧低下→翌日断水→3日後衛生崩壊</li>
          <li>Family Meter: 生存日数 = min(水÷3L人日, 食料日数, ガス÷30分人日, 電力÷50Wh人日)</li>
        </ul>

        <h2 style="font-size:1rem;margin-top:1.5rem;">データソース（全て公開データ）</h2>
        <ul style="font-size:0.85rem;color:#999;">
          <li>経産省 石油備蓄推計量（2026年3月20日時点）</li>
          <li>ISEP 電力調査統計（2024年暦年速報）</li>
          <li>JETRO / 財務省 貿易統計（2025年実績）</li>
          <li>OCCTO 電力広域的運営推進機関（連系線運用容量2025年度）</li>
          <li>原子力規制委員会（稼働原発一覧）</li>
          <li>OWID energy-data（石油・LNG消費量ベースライン）</li>
          <li>Natural Earth 110m（タンカーマップ地図データ — Public Domain）</li>
        </ul>
