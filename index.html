        <p style="font-size:1.2rem;margin:1rem 0;">日本のエネルギーが尽きるまで</p>
        <p>石油の94%は中東から届く。その全量がホルムズ海峡を通る。供給が止まったら——</p>

          <li>LNG在庫: <strong style="color:#ef4444;">約25日分</strong>（ホルムズ依存は6.3%だが市場波及リスクあり）</li>
          <li>電力供給: <strong style="color:#ef4444;">火力65%</strong>が影響（LNG29%+石炭28%+石油7%）</li>
        </ul>
        <p style="margin-top:1rem;">全国10電力エリアの崩壊順序を可視化し、あなたの家庭の生存可能日数を算出する戦術ダッシュボード。</p>
        <p>沖縄（完全島嶼）→ 北海道・四国（連系線限定）→ 東京・関西（大需要圏）の順に機能停止。</p>
