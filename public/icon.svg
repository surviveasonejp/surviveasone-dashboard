<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>

  <!--
    5 segments × 64° + 5 gaps × 8° = 360°
    Angles: 0-64 | gap 64-72 | 72-136 | gap 136-144 | 144-208
            gap 208-216 | 216-280 | gap 280-288 | 288-352 | gap 352-360
    Outer R=190, Inner r=130, Center (256,256)
  -->

  <!-- Segment 1: 0°–64° #5a8ce1 -->
  <path d="M 256,66 A 190,190 0 0,1 427,173 L 373,199 A 130,130 0 0,0 256,126 Z" fill="#5a8ce1"/>

  <!-- Segment 2: 72°–136° #96d0f5 -->
  <path d="M 437,197 A 190,190 0 0,1 388,393 L 346,350 A 130,130 0 0,0 380,216 Z" fill="#96d0f5"/>

  <!-- Segment 3: 144°–208° #b4d598 -->
  <path d="M 368,410 A 190,190 0 0,1 167,424 L 195,371 A 130,130 0 0,0 332,361 Z" fill="#b4d598"/>

  <!-- Segment 4: 216°–280° #3f7bbf -->
  <path d="M 144,410 A 190,190 0 0,1 69,223 L 128,233 A 130,130 0 0,0 180,361 Z" fill="#3f7bbf"/>

  <!-- Segment 5: 288°–352° #244b95 -->
  <path d="M 75,197 A 190,190 0 0,1 230,68 L 238,127 A 130,130 0 0,0 132,216 Z" fill="#244b95"/>

  <!-- SAO text -->
  <text
    x="256" y="256"
    font-family="'Lato Black', Lato, 'Arial Black', sans-serif"
    font-size="96"
    font-weight="900"
    fill="#1e2c47"
    text-anchor="middle"
    dominant-baseline="central">SAO</text>
</svg>
